services:
  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/releases
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      API_KEY: ${API_KEY:-local-dev-key}
      SCAN_INTERVAL_MS: ${SCAN_INTERVAL_MS:-60000}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@example.com}
    ports:
      - '3000:3000'
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: releases
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '5432:5432'
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit
    ports:
      - '1025:1025'
      - '8025:8025'
    restart: unless-stopped

  swagger-ui:
    image: swaggerapi/swagger-ui
    depends_on:
      app:
        condition: service_started
    environment:
      URL: /swagger.yaml
    ports:
      - '8081:8080'
    restart: unless-stopped
    volumes:
      - ./swagger.yaml:/usr/share/nginx/html/swagger.yaml:ro
      - ./docker/swagger-ui/nginx.conf:/etc/nginx/templates/default.conf.template:ro

volumes:
  postgres-data:
